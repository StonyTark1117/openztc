name: Build

on:
  push:

jobs:
  Linux:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends git ca-certificates g++ make cmake zlib1g-dev libasound-dev libxkbcommon-dev libdrm-dev libgl1-mesa-dev libgbm-dev libwayland-dev libdecor-0-dev
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build
        run: |
          mkdir openztc && cd openztc
          cmake -DCMAKE_BUILD_TYPE=Release -DSDL_X11=OFF ..
          cmake --build .
          strip --strip-unneeded openztc
          cp ../LICENSE.txt ../README.md ./
      - name: Publish artifacts
        uses: actions/upload-artifact@v6
        with:
          name: openztc-linux
          path: |
            openztc/openztc
            openztc/font
            openztc/LICENSE.txt
            openztc/README.md

  Windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Install dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils
            mingw-w64-x86_64-make
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-SDL2_ttf
            mingw-w64-x86_64-SDL2_image
            mingw-w64-x86_64-SDL2_mixer
            mingw-w64-x86_64-libzip
          update: true
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build
        run: |
          mkdir openztc && cd openztc
          cmake -DCMAKE_BUILD_TYPE=Release ..
          cmake --build .
          strip --strip-unneeded openztc.exe
          ldd openztc.exe | grep /mingw64 | awk '{print $3}' | xargs -i cp {} .
          cp ../LICENSE.txt ../README.md ./
      - name: Publish artifacts
        uses: actions/upload-artifact@v6
        with:
          name: openztc-windows
          path: |
            openztc/openztc.exe
            openztc/*.dll
            openztc/font
            openztc/LICENSE.txt
            openztc/README.md

  Release:
    needs: [Linux, Windows]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        build: [linux, windows]
    steps:
    - uses: actions/download-artifact@v8
    - name: Zip artifacts
      run: |
        zip -r openztc-${{matrix.build}}.zip openztc-${{matrix.build}}
    - name: Release
      uses: softprops/action-gh-release@v2.4.2
      with:
        files: openztc-${{matrix.build}}.zip
        prerelease: true
        name: openztc ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Tests:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends git ca-certificates g++ make cmake zlib1g-dev libasound-dev libxkbcommon-dev libdrm-dev libgl1-mesa-dev libgbm-dev libwayland-dev libdecor-0-dev
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build and run tests with sanitizers
        run: |
          mkdir build && cd build
          cmake -DCMAKE_BUILD_TYPE=Debug -DBUILD_TESTS=ON -DSDL_X11=OFF -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-sanitize-recover=all" -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined" ..
          cmake --build . --target openztc-tests -j$(nproc)
          ./openztc-tests
